# Model arguments
model_name_or_path: Qwen/Qwen3-0.6B
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# Data training arguments
dataset_name: Blancy/verifiable-coding-problems-CoT
system_prompt: "You are a helpful AI Assistant that provides well-reasoned and detailed responses. You first think about the reasoning process as an internal monologue and then provide the user with the answer. Respond in the following format: <think>\n...\n</think>\n<answer>\n...\n</answer>"

# GRPO trainer config
bf16: true
use_vllm: true
vllm_device: auto
vllm_gpu_memory_utilization: 0.5
do_eval: false
gradient_accumulation_steps: 12
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
hub_model_id: Qwen3-1.7B-G2RPO-A-Code
hub_strategy: every_save
learning_rate: 1.0e-06
log_completions: true
log_level: info
logging_first_step: true
logging_steps: 1
logging_strategy: steps
lr_scheduler_type: cosine
max_prompt_length: 512
max_completion_length: 3072
vllm_max_model_len: 4608
max_steps: -1
num_generations: 6
num_train_epochs: 5
output_dir: data/g2rpoa_guided_gpu23
overwrite_output_dir: false
per_device_eval_batch_size: 10
per_device_train_batch_size: 6
push_to_hub: false
swanlab_project: "open-r1-swanlab"
report_to: []
reward_funcs:
- code
- format
reward_weights:
- 1.0
- 1.0
save_strategy: "epoch"
save_total_limit: 1
seed: 42
temperature: 0.7
warmup_ratio: 0.1

# G2RPO-A trainer config
use_g2rpoa: true
guided_ratio: 1.0
guidance_length_init: 384
max_guidance_length: 768
guidance_history_t: 2
guidance_wrap_think: true
