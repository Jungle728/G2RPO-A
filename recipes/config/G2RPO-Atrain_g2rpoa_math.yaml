# G2RPO-A math RL config. Uses the run3-style hyperparams (lr=1e-5,
# cosine_with_min_lr, warmup=0.05, batch=6, num_generations=6) but on
# DeepScaleR-Preview with accuracy + format rewards.

# Model arguments
model_name_or_path: /share/models/Qwen3/Qwen3-1.7B
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# Data training arguments
dataset_name: agentica-org/DeepScaleR-Preview-Dataset
system_prompt: "You are a helpful AI Assistant that provides well-reasoned and detailed responses. You first think about the reasoning process as an internal monologue and then provide the user with the answer. Respond in the following format: <think>\n...\n</think>\n<answer>\n...\n</answer>. Put your final mathematical answer inside \\boxed{...} within the <answer> block."

# GRPO trainer config
bf16: true
use_vllm: true
vllm_device: auto
vllm_gpu_memory_utilization: 0.85
do_eval: false
gradient_accumulation_steps: 4
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
hub_model_id: Qwen3-1.7B-G2RPO-A-Math
hub_strategy: every_save
learning_rate: 1.0e-05
log_completions: true
log_level: info
logging_first_step: true
logging_steps: 1
logging_strategy: steps
lr_scheduler_type: cosine_with_min_lr
lr_scheduler_kwargs:
  min_lr_rate: 0.1
max_prompt_length: 512
# Math reasoning chains are much shorter than code completions; cap at 2048
# to keep KV cache around 22 GB on an H100 (vs 40 GB for code's 4096+).
max_completion_length: 2048
vllm_max_model_len: 2560
max_steps: -1
num_generations: 10
num_train_epochs: 5
output_dir: data/g2rpoa_math_run
overwrite_output_dir: false
per_device_eval_batch_size: 10
per_device_train_batch_size: 10
push_to_hub: false
swanlab_project: "open-r1-swanlab"
report_to: []
reward_funcs:
- accuracy
- format
reward_weights:
- 1.0
- 0.1
save_strategy: "epoch"
save_total_limit: 5
seed: 42
temperature: 0.7
warmup_ratio: 0.05

# G2RPO-A trainer config (mirrors G2RPO-Atrain_g2rpoa.yaml)
use_g2rpoa: true
guided_ratio: 1.0
guidance_length_init: 384
max_guidance_length: 768
guidance_history_t: 2
guidance_wrap_think: true
