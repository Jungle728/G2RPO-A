# G2RPO-A math RL config for Qwen3-1.7B-Base, matches paper Table 3 setup.
# Variant of G2RPO-Atrain_g2rpoa_math_cl200.yaml. Only deltas:
#   - model_name_or_path        -> Qwen3-1.7B-Base
#   - hub_model_id / output_dir -> renamed for the base run.
# `guided_ratio` stays at 0.25 (same as 1.7B post-trained per paper Table 9).
# Note: Qwen3-1.7B-Base ships the same chat_template as the post-trained version,
# so make_conversation in src/open_r1/grpo.py works without changes.

# Model arguments
model_name_or_path: /share/models/Qwen3/Qwen3-1.7B-Base
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# Data: local arrow dir written by scripts/build_math_cl_subset.py.
dataset_name: data/openr1_math_cl200
system_prompt: "You are a helpful AI Assistant that provides well-reasoned and detailed responses. You first think about the reasoning process as an internal monologue and then provide the user with the answer. Respond in the following format: <think>\n...\n</think>\n<answer>\n...\n</answer>. Put your final mathematical answer inside \\boxed{...} within the <answer> block."

# GRPO trainer config
bf16: true
use_vllm: true
vllm_device: auto
vllm_gpu_memory_utilization: 0.85
do_eval: false
gradient_accumulation_steps: 5
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
hub_model_id: Qwen3-1.7B-Base-G2RPO-A-Math-CL200
hub_strategy: every_save
learning_rate: 1.0e-05
log_completions: true
log_level: info
logging_first_step: true
logging_steps: 1
logging_strategy: steps
lr_scheduler_type: cosine_with_min_lr
lr_scheduler_kwargs:
  min_lr_rate: 0.1
max_prompt_length: 512
max_completion_length: 3328
vllm_max_model_len: 3840
max_steps: -1
num_generations: 4
num_train_epochs: 5
output_dir: data/g2rpoa_math_cl200_qwen3_1.7b_base_run
overwrite_output_dir: false
per_device_eval_batch_size: 8
per_device_train_batch_size: 8
push_to_hub: false
swanlab_project: "open-r1-swanlab"
report_to: []
reward_funcs:
- accuracy
- format
reward_weights:
- 1.0
- 0.1
save_strategy: "epoch"
save_total_limit: 5
seed: 42
temperature: 0.7
warmup_ratio: 0.05

# G2RPO-A trainer config
use_g2rpoa: true
guided_ratio: 0.25            # Paper Table 9 best for Qwen3-1.7B math (alpha = 1/4).
guidance_length_init: 384
max_guidance_length: 768
guidance_history_t: 2
# OpenR1-Math `generations` already starts with `<think>\n...`, so don't wrap.
guidance_wrap_think: false

# Curriculum learning: preserve on-disk easy->hard order each epoch.
use_curriculum: true
